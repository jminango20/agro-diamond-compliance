# Busca todos os tipos de eventos de identidade de uma vez
# (requer 3 chamadas separadas pois protocolEvents aceita apenas 1 eventType)

# Identidades vinculadas
query IdentityBoundEvents($first: Int = 20) {
  protocolEvents(first: $first, eventType: "identity_bound") {
    txHash
    block
    eventType
    address
    data
  }
}

# Exemplo:
# { "first": 50 }

