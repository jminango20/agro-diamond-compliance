# Eventos do CountryRestrictModule
#
# Emite:
# CountryRestricted(uint256 indexed tokenId, uint16 indexed country)
# CountryUnrestricted(uint256 indexed tokenId, uint16 indexed country)
#
# Modulo externo ao Diamond — requer EXTRA_ADDRESSES no indexer config
# para que esses eventos sejam capturados.

# Paises adicionados a blocklist
query CountryRestrictedEvents($first: Int = 50, $tokenId: String) {
  protocolEvents(first: $first, eventType: "country_restricted", tokenId: $tokenId) {
    txHash
    block
    logIndex
    eventType
    tokenId
    data
  }
}

# Exemplo 1 — Todos os paises restritos:
# {}
#
# Exemplo 2 — Paises restritos do token 1:
# { "tokenId": "1" }
#
# O campo "data" contem JSON com:
# { "country": 840 }
# (840 = EUA, 826 = UK, etc.)

