# Eventos do MaxBalanceModule
#
# Emite:
# MaxBalanceSet(uint256 indexed tokenId, uint256 maxBalance)
#
# Define o balance maximo que um holder pode ter para um tokenId.
# Previne concentracao de risco.
# Modulo externo ao Diamond — requer EXTRA_ADDRESSES no indexer config.

query MaxBalanceSetEvents($first: Int = 50, $tokenId: String) {
  protocolEvents(first: $first, eventType: "max_balance_set", tokenId: $tokenId) {
    txHash
    block
    logIndex
    eventType
    tokenId
    data
  }
}

# Exemplo 1 — Todos os limites de balance definidos:
# {}
#
# Exemplo 2 — Limites do token 1:
# { "tokenId": "1" }
#
# O campo "data" contem JSON com:
# { "maxBalance": "1000000" }
# (0 = sem limite)
