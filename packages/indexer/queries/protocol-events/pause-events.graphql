# Eventos de pause/unpause do protocolo e assets
query EmergencyPauseEvents($first: Int = 50) {
  protocolEvents(first: $first, eventType: "emergency_pause") {
    txHash
    block
    logIndex
    eventType
    address
    data
  }
}

