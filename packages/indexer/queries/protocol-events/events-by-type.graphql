# Eventos do protocolo filtrados por tipo
query EventsByType($eventType: String!, $first: Int = 50) {
  protocolEvents(first: $first, eventType: $eventType) {
    txHash
    block
    logIndex
    eventType
    tokenId
    address
    data
  }
}

