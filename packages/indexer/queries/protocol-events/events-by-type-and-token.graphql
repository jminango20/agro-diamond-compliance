# Eventos filtrados por tipo E token ID (filtro combinado)
query EventsByTypeAndToken($eventType: String!, $tokenId: String!, $first: Int = 50) {
  protocolEvents(first: $first, eventType: $eventType, tokenId: $tokenId) {
    txHash
    block
    logIndex
    eventType
    tokenId
    address
    data
  }
}

# Exemplo 1 — Snapshots do token 1:
# { "eventType": "snapshot_created", "tokenId": "1" }
