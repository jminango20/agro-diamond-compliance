# Eventos do protocolo filtrados por token ID
query EventsByToken($tokenId: String!, $first: Int = 50) {
  protocolEvents(first: $first, tokenId: $tokenId) {
    txHash
    block
    logIndex
    eventType
    tokenId
    address
    data
  }
}

# Exemplo 1 — Todos os eventos do token 1:
# { "tokenId": "1" }
#
# Exemplo 2 — Ultimos 100 eventos do token 3:
# { "tokenId": "3", "first": 100 }
