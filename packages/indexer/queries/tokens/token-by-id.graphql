# Busca um token por ID com holders e eventos de transferencia
query TokenById($id: String!) {
  token(id: $id) {
    id
    totalSupply
    holderCount
    holders(first: 50) {
      address
      balance
    }
    events(first: 20) {
      txHash
      block
      logIndex
      from
      to
      amount
      eventType
    }
  }
}

