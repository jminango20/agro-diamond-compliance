# Eventos de reward assets adicionados/removidos no YieldDistributorModule
#
# YieldDistributorModule emite:
# RewardAssetAdded(uint256 indexed tokenId, address indexed token, uint256 id, RewardType assetType)
# RewardAssetRemoved(uint256 indexed tokenId, address indexed token, uint256 id, RewardType assetType)
#
# RewardType: 0 = ERC-20 (USDC, WETH, etc.), 1 = ERC-1155

# Reward assets adicionados
query RewardAssetAddedEvents($first: Int = 50, $tokenId: String) {
  protocolEvents(first: $first, eventType: "reward_asset_added", tokenId: $tokenId) {
    txHash
    block
    logIndex
    eventType
    tokenId
    address
    data
  }
}

# Exemplo 1 — Todos os reward assets adicionados:
# {}
#
# Exemplo 2 — Reward assets do token 1:
# { "tokenId": "1" }
#
# O campo "data" contem JSON com:
# { "token": "0x...", "id": "0", "assetType": "ERC20" }
# ou
# { "token": "0x...", "id": "5", "assetType": "ERC1155" }

