# Eventos de freeze/unfreeze do protocolo
query WalletFreezeEvents($first: Int = 50) {
  protocolEvents(first: $first, eventType: "wallet_frozen") {
    txHash
    block
    logIndex
    eventType
    address
    data
  }
}

# Exemplo 1 — Eventos de wallet_frozen:
# {}
#
# Para outros tipos de eventos de freeze, altere eventType:
#
# Tipos disponiveis:
# - "wallet_frozen"    → freeze/unfreeze global de wallet
# - "asset_frozen"     → freeze/unfreeze per-asset
# - "partial_freeze"   → freeze parcial (quantidade especifica)
# - "lockup_set"       → lockup com expiracao definida
