# Lista todas as wallets congeladas, com filtro opcional por tokenId
query FrozenWallets($tokenId: String) {
  frozenWallets(tokenId: $tokenId) {
    wallet
    tokenId
    frozen
    frozenAmount
    lockupExpiry
  }
}

