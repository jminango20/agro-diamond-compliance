# Asset completo por ID: metadata + holders + eventos do protocolo
query AssetById($id: String!) {
  asset(id: $id) {
    id
    name
    symbol
    issuer
    profileId
    uri
    paused
    totalSupply
    holderCount
    registeredAt
    holders(first: 50) {
      address
      balance
    }
    events(first: 20) {
      txHash
      block
      logIndex
      eventType
      tokenId
      address
      data
    }
  }
}

