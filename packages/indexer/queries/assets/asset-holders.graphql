# Holders de um asset com metadata basica
query AssetHolders($id: String!, $first: Int = 50) {
  asset(id: $id) {
    id
    name
    symbol
    totalSupply
    holderCount
    holders(first: $first) {
      address
      balance
    }
  }
}

