# Overview completo para dashboard: status + assets + tokens + eventos
query DashboardOverview {
  status {
    lastBlock
    tokenCount
  }
  assets {
    id
    name
    symbol
    issuer
    paused
    totalSupply
    holderCount
  }
  tokens {
    id
    totalSupply
    holderCount
    holders(first: 10) {
      address
      balance
    }
  }
  events(first: 20) {
    txHash
    block
    tokenId
    from
    to
    amount
    eventType
  }
  protocolEvents(first: 10) {
    txHash
    block
    eventType
    tokenId
    address
    data
  }
}
