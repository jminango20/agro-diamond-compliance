services:
  # ── Indexer (Go + RocksDB) ──
  indexer:
    build:
      context: ./packages/indexer
      dockerfile: Dockerfile
    container_name: diamond-indexer
    restart: unless-stopped
    ports:
      - "${INDEXER_PORT:-8080}:8080"
    environment:
      - DIAMOND_ADDRESS=0xAb07CEf1BEeDBb30F5795418c79879794b31C521
      - RPC_URL=https://rpc-amoy.polygon.technology
      - START_BLOCK=35301007
      - EXTRA_ADDRESSES=0x0c15e06c36b07E44aEe6D49a75554bc7bfFa50D2,0x4B3cCd1F7BB1aF5F41b73e7fE3010023FcD89B44,0xC40Bf7bb339DD4485b1F5c3c0C5FE78DACD9999a,0xa8c6A9AAfd18545bEe6BC734eba702C55beA95dF
      - HTTP_LISTEN=:8080
      - DATA_DIR=/app/data
    volumes:
      - indexer-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ── Frontend (React SPA via nginx) ──
  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      args:
        VITE_DIAMOND_ADDRESS: "0xAb07CEf1BEeDBb30F5795418c79879794b31C521"
        VITE_INDEXER_URL: "${VITE_INDEXER_URL:-http://localhost:8080}"
        VITE_RPC_URL: "https://rpc-amoy.polygon.technology"
        VITE_COUNTRY_RESTRICT_MODULE: "0x0c15e06c36b07E44aEe6D49a75554bc7bfFa50D2"
        VITE_MAX_BALANCE_MODULE: "0x4B3cCd1F7BB1aF5F41b73e7fE3010023FcD89B44"
        VITE_MAX_HOLDERS_MODULE: "0xC40Bf7bb339DD4485b1F5c3c0C5FE78DACD9999a"
    container_name: diamond-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      indexer:
        condition: service_healthy

  # ── Forge Visual (Test Dashboard + Foundry) ──
  forge-visual:
    build:
      context: .
      dockerfile: packages/tools/forge-visual/Dockerfile
    container_name: diamond-forge-visual
    restart: unless-stopped
    ports:
      - "${FORGE_VISUAL_PORT:-3999}:3999"
    environment:
      - FORGE_PROJECT=/project
      - PORT=3999
      - NODE_ENV=production
    volumes:
      - forge-reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3999/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  indexer-data:
  forge-reports:
